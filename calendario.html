<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Académicos - Calendário de Jogos</title>
    <link rel="shortcut icon" type="image/x-icon" href="FCA.ico">
    
    <link rel="apple-touch-icon" href="academicos.png">
    <link rel="icon" type="image/png" sizes="192x192" href="academicos.png">
    
    <meta name="apple-mobile-web-app-title" content="Académicos">
    <style>
        :root { 
            /* Paleta Monocromática Avançada obtida do painel novo */
            --primary: #000000; 
            --accent: #222222; 
            --error: #ff4d4d; 
            --success: #1a1a1a; 
            --bg: #f8f9fa; 
            --finished-bg: #eeeeee; 
            --finished-text: #666666;
            --warning: #444444;
            
            /* Tons auxiliares de Cinza */
            --gray-light: #f1f3f5; 
            --gray-border: #e2e8f0;
            --gray-dark: #64748b;
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            color: #111111;
        }

        .main-content { 
            width: 96%; 
            max-width: 1350px; 
            margin: 25px auto; 
        }

        .container { 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 16px; 
            border: 1px solid var(--gray-border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.02); 
            margin-bottom: 30px; 
        }

        /* Header Minimalista */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 30px; 
            border-bottom: 1px solid var(--gray-border); 
            padding-bottom: 20px; 
        }
        .header-logo { 
            max-height: 40px; 
            margin-right: 15px; 
        }
        header h2 {
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        /* Grade de Estatísticas com Escala de Cinzas Diversificada */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); 
            gap: 15px; 
            margin-bottom: 25px; 
        }
        .stat-card { 
            padding: 18px; 
            border-radius: 12px; 
            text-align: center; 
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-2px);
        }
        .stat-card h3 {
            margin: 0;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-card p { 
            margin: 8px 0 0; 
            font-size: 28px; 
            font-weight: 900; 
        }
        
        .stat-card.total {
            background: #ffffff;
            border: 1px solid var(--gray-border);
            color: #000000;
        }
        .stat-card.total h3 { color: var(--gray-dark); }
        .stat-card.total p { color: #000000; }

        .stat-card.casa {
            background: #111111; 
            border: 1px solid #111111;
            color: #ffffff;
        }
        .stat-card.casa h3 { color: #a0aec0; }
        .stat-card.casa p { color: #ffffff; }

        .stat-card.fora {
            background: #ffffff;
            border: 2px dashed #000000; 
            color: #000000;
        }
        .stat-card.fora h3 { color: #000000; font-weight: 800; }
        .stat-card.fora p { color: #000000; }

        .stat-card.fim {
            background: var(--finished-bg); 
            border: 1px solid var(--gray-border);
            color: var(--finished-text);
        }
        .stat-card.fim h3 { color: var(--finished-text); }
        .stat-card.fim p { color: #000000; }

        /* Filtros */
        .filter-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 16px; 
            background: var(--bg); 
            padding: 24px; 
            border-radius: 12px; 
            border: 1px solid var(--gray-border); 
            margin-bottom: 30px; 
        }
        .field { 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
            position: relative; 
        }
        .field label { 
            font-size: 10px; 
            font-weight: 800; 
            color: #000000; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input, select { 
            padding: 12px; 
            border: 1px solid var(--gray-border); 
            border-radius: 8px; 
            font-size: 13px; 
            background: #ffffff; 
            color: #000000;
            outline: none;
            transition: 0.2s;
        }
        input:focus, select:focus {
            border-color: #000000;
        }

        /* Multiselect */
        .multiselect-wrap { position: relative; width: 100%; }
        .multiselect-selected { 
            background: white; 
            border: 1px solid var(--gray-border); 
            border-radius: 8px; 
            padding: 12px; 
            font-size: 13px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            min-height: 43px; 
            box-sizing: border-box; 
        }
        .multiselect-dropdown { 
            position: absolute; 
            top: 105%; 
            left: 0; 
            width: 100%; 
            background: white; 
            border: 1px solid var(--gray-border); 
            border-radius: 8px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); 
            z-index: 100; 
            display: none; 
            max-height: 200px; 
            overflow-y: auto; 
            padding: 5px 0; 
        }
        .multiselect-dropdown.show { display: block; }
        .multiselect-item { 
            padding: 10px 14px; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            font-size: 13px; 
            cursor: pointer; 
        }
        .multiselect-item:hover { background: var(--bg); }

        .btn-dark {
            padding: 12px 18px;
            background: var(--accent);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-dark:hover {
            background: var(--primary);
        }

        .collapsible-trigger { 
            width: 100%; 
            padding: 18px 20px; 
            background: var(--accent); 
            color: #ffffff; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            text-align: left; 
            font-weight: 800; 
            font-size: 13px;
            letter-spacing: 1px;
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px; 
            transition: background 0.2s; 
        }
        .collapsible-trigger:hover {
            background: var(--primary);
        }
        .collapsible-content { 
            max-height: 0; 
            overflow: hidden; 
            transition: max-height 0.4s cubic-bezier(0, 1, 0, 1); 
        }
        .collapsible-content.active { 
            max-height: 2000px; 
            margin-bottom: 25px; 
        }

        .secao-titulo {
            font-size: 16px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 30px 0 15px;
            color: #000000;
        }

        /* Tabelas */
        .table-wrapper { 
            background: #ffffff; 
            border-radius: 12px; 
            border: 1px solid var(--gray-border); 
            overflow: hidden; 
            margin-bottom: 30px; 
        }
        .historico-wrapper { 
            background: var(--finished-bg) !important; 
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
            min-width: 900px; 
            table-layout: auto;
        }
        th { 
            background: #fafafa; 
            padding: 16px 14px; 
            text-align: left; 
            color: #000000; 
            font-size: 11px; 
            font-weight: 800;
            text-transform: uppercase; 
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--gray-border); 
        }
        
        th:first-child {
            width: 4px;
            max-width: 4px;
            min-width: 4px;
            padding: 0;
        }
        
        td { 
            padding: 16px 14px; 
            border-bottom: 1px solid var(--gray-border); 
            font-size: 13px; 
            color: #111111;
        }
        tr:hover td {
            background-color: #fafafa;
        }
        .row-finalizado td { 
            background-color: var(--finished-bg) !important; 
            color: var(--finished-text) !important; 
        }

        /* Estilos Mobile Refinados */
        .mobile-list { display: none; flex-direction: column; gap: 15px; }
        .game-card { 
            background: #ffffff; 
            border-radius: 12px; 
            padding: 20px; 
            border: 1px solid var(--gray-border); 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
        }
        .card-finalizado-mobile { 
            background: var(--finished-bg) !important; 
            border-color: #d2d2d2 !important; 
            color: var(--finished-text);
        }
        .card-full { 
            grid-column: 1 / -1; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--gray-border); 
            padding-bottom: 12px; 
            font-weight: 800; 
            color: #000000; 
            font-size: 15px;
        }
        .info-item { 
            font-size: 13px; 
            color: #222222; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }
        
        .maps-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--gray-light);
            color: #000000;
            border: 1px solid var(--gray-border);
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 11px;
            font-weight: 700;
            text-decoration: none;
            gap: 4px;
            margin-top: 2px;
            transition: 0.2s;
        }
        .maps-btn:hover {
            background: #000000;
            color: #ffffff;
        }

        /* Badges Minimalistas */
        .badge { 
            padding: 6px 10px; 
            border-radius: 4px; 
            font-size: 9px; 
            font-weight: 900; 
            text-transform: uppercase; 
            white-space: nowrap; 
        }
        .badge-casa { 
            background: #111111; 
            color: #ffffff; 
        }
        .badge-fora { 
            background: #ffffff; 
            color: #000000; 
            border: 1px solid #000000; 
        }
        .badge-finalizado { 
            background: #666666; 
            color: #ffffff; 
        }

        .resultado-tag { font-weight: 900; color: #000000; font-size: 15px; }
        .parciais-tag { font-size: 12px; color: var(--gray-dark); }

        @media screen and (min-width: 1025px) { 
            .table-wrapper { display: block !important; } 
            .mobile-list { display: none !important; } 
        }
        @media screen and (max-width: 1024px) { 
            .table-wrapper { display: none !important; } 
            .mobile-list { display: flex !important; }
            .filter-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            header { flex-direction: column; text-align: center; gap: 15px; }
            .main-content { margin: 15px auto; }
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="main-content" id="app">
    <div class="container">
        <header>
            <div style="display: flex; align-items: center;">
                <img src="academicos.png" alt="Logo" class="header-logo" onerror="this.style.display='none'">
                <h2 style="margin:0; color: var(--primary); font-size: 1.1rem;">FC Os Académicos - Calendário</h2>
            </div>
            <div>
                <span style="font-size: 12px; color: var(--gray-dark); font-weight: bold;">📢 Consulta de Jogos</span>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card total"><h3>Total Jogos</h3><p id="statTotal">0</p></div>
            <div class="stat-card casa"><h3>Em Casa</h3><p id="statCasa">0</p></div>
            <div class="stat-card fora"><h3>Fora</h3><p id="statFora">0</p></div>
            <div class="stat-card fim"><h3>Terminados</h3><p id="statFim">0</p></div>
        </div>

        <div class="filter-grid">
            <div class="field"><label>🔍 Filtrar Treinadores</label>
                <div class="multiselect-wrap">
                    <div class="multiselect-selected" onclick="toggleDrop('dropT')"><span id="txtT">Todos</span> ▾</div>
                    <div id="dropT" class="multiselect-dropdown"></div>
                </div>
            </div>
            <div class="field"><label>🔍 Filtrar Escalões</label>
                <div class="multiselect-wrap">
                    <div class="multiselect-selected" onclick="toggleDrop('dropE')"><span id="txtE">Todos</span> ▾</div>
                    <div id="dropE" class="multiselect-dropdown"></div>
                </div>
            </div>
            <div class="field"><label>🔍 Data Específica</label><input type="date" id="filterData" onchange="render()"></div>
            <div class="field"><label>🔍 Local</label><select id="filterLocal" onchange="handleFilterLocalChange()"><option value="">Todos</option><option value="Casa">Casa</option><option value="Fora">Fora</option></select></div>
            <div class="field" id="filterPavilhaoContainer" style="display:none;"><label>🔍 Pavilhão</label><select id="filterPavilhao" onchange="render()"><option value="">Todos</option></select></div>
            <div style="display: flex; align-items: flex-end;"><button class="btn-dark" onclick="window.print()" style="padding: 12px 20px;">🖨️ PDF</button></div>
        </div>

        <h3 class="secao-titulo">Próximos Jogos</h3>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th></th>
                        <th>Treinador</th>
                        <th>Comp.</th>
                        <th>Jor.</th>
                        <th>Nº</th>
                        <th>Escalão</th>
                        <th>Adversário</th>
                        <th>Data/Hora</th>
                        <th>Pavilhão / Localização</th>
                        <th>Local</th>
                    </tr>
                </thead>
                <tbody id="listaWeb"></tbody>
            </table>
        </div>
        <div id="listaMobile" class="mobile-list"></div>

        <button class="collapsible-trigger" onclick="toggleSection('historicoContainer')" style="background: var(--finished-text); margin-top: 30px;">
            <span>📜 HISTÓRICO DE RESULTADOS</span> <span id="historicoContainerIcon">▼</span>
        </button>
        <div id="historicoContainer" class="collapsible-content">
            <div class="table-wrapper historico-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th></th>
                            <th>Treinador</th>
                            <th>Escalão</th>
                            <th>Adversário / Resultado</th>
                            <th>Data</th>
                            <th>Pavilhão</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="listaHistoricoWeb"></tbody>
                </table>
            </div>
            <div id="listaHistoricoMobile" class="mobile-list"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyB86TeZnp2qdOXXwjvD3hFfzTi3Z3NkVMc", authDomain: "academicos-d2cfc.firebaseapp.com", projectId: "academicos-d2cfc", storageBucket: "academicos-d2cfc.firebasestorage.app", messagingSenderId: "550824625713", appId: "1:550824625713:web:f3194f8e4f06dc141a3710" };
    const app = initializeApp(firebaseConfig); const db = getFirestore(app); const jogosCol = collection(db, "jogos");
    let jogosAtuais = [], listT = [], listE = [], listP = [];

    onSnapshot(collection(db, "treinadores"), s => { listT = s.docs.map(d => d.data().val).sort((a,b) => a.localeCompare(b)); updateUIFilters(); });
    onSnapshot(collection(db, "escaloes"), s => { listE = s.docs.map(d => d.data().val).sort((a,b) => a.localeCompare(b)); updateUIFilters(); });
    onSnapshot(collection(db, "pavilhoes"), s => { listP = s.docs.map(d => d.data().val).sort((a,b) => a.localeCompare(b)); updateUIFilters(); });

    function updateUIFilters() {
        const fTSel = document.getElementById('dropT'), fESel = document.getElementById('dropE'), fPSel = document.getElementById('filterPavilhao');
        fPSel.innerHTML = '<option value="">Todos</option>' + listP.map(x => `<option value="${x}">${x}</option>`).join('');
        fTSel.innerHTML = listT.map(x => `<label class="multiselect-item"><input type="checkbox" value="${x}" onchange="updateMulti('T')"> ${x}</label>`).join('');
        fESel.innerHTML = listE.map(x => `<label class="multiselect-item"><input type="checkbox" value="${x}" onchange="updateMulti('E')"> ${x}</label>`).join('');
    }

    window.toggleSection = (id) => { const c = document.getElementById(id); const icon = document.getElementById(id + 'Icon'); c.classList.toggle('active'); icon.innerText = c.classList.contains('active') ? '▲' : '▼'; };
    window.toggleDrop = (id) => { document.querySelectorAll('.multiselect-dropdown').forEach(el => { if(el.id !== id) el.classList.remove('show'); }); document.getElementById(id).classList.toggle('show'); };
    window.updateMulti = (type) => { const items = Array.from(document.querySelectorAll(`#drop${type} input:checked`)); document.getElementById(`txt${type}`).innerText = items.length === 0 ? "Todos" : (items.length === 1 ? items[0].value : `${items.length} Selecionados`); render(); };
    window.handleFilterLocalChange = () => { document.getElementById('filterPavilhaoContainer').style.display = (document.getElementById('filterLocal').value === 'Casa') ? 'flex' : 'none'; render(); };

    onSnapshot(query(jogosCol, orderBy("data"), orderBy("hora")), (s) => { 
        jogosAtuais = s.docs.map(d => ({ id: d.id, ...d.data() })); 
        render(); 
    });

    window.render = () => {
        const lWeb = document.getElementById('listaWeb'), lMob = document.getElementById('listaMobile'), hWeb = document.getElementById('listaHistoricoWeb'), hMob = document.getElementById('listaHistoricoMobile');
        const selT = Array.from(document.querySelectorAll('#dropT input:checked')).map(i => i.value), selE = Array.from(document.querySelectorAll('#dropE input:checked')).map(i => i.value);
        const fD = document.getElementById('filterData').value, fL = document.getElementById('filterLocal').value, fP = document.getElementById('filterPavilhao').value;
        
        lWeb.innerHTML = ''; lMob.innerHTML = ''; hWeb.innerHTML = ''; hMob.innerHTML = '';
        let cC = 0, cF = 0, cFin = 0;

        jogosAtuais.forEach(j => {
            if(selT.length > 0 && !selT.includes(j.treinador)) return; 
            if(selE.length > 0 && !selE.includes(j.escalao)) return; 
            if(fD && j.data !== fD) return; 
            if(fL && j.casaFora !== fL) return; 
            if(fL === 'Casa' && fP && j.pavilhao !== fP) return;

            const dt = j.data ? j.data.split('-').reverse().join('/') : '-';

            if(!j.finalizado) {
                if(j.casaFora === 'Casa') cC++; else cF++;
                
                const mapHTML = j.mapsLink ? `<a href="${j.mapsLink}" target="_blank" class="maps-btn">📍 Mapa</a>` : '';

                // Renderização Web Próximos (coluna fina de cor respeitada)
                const tr = document.createElement('tr');
                tr.innerHTML = `<td style="background:${j.cor}; width:4px; max-width:4px; min-width:4px; padding:0; margin:0;"></td>
                                <td style="font-weight:bold; color:#000000">${j.treinador}</td>
                                <td>${j.competicao||'-'}</td>
                                <td>${j.jornada||'-'}</td>
                                <td>${j.numJogo||'-'}</td>
                                <td style="font-weight:bold;">${j.escalao}</td>
                                <td>${j.adversario || '---'}</td>
                                <td style="font-weight:bold;">${dt} às ${j.hora}</td>
                                <td>${j.pavilhao} ${mapHTML}</td>
                                <td><span class="badge ${j.casaFora === 'Casa' ? 'badge-casa' : 'badge-fora'}">${j.casaFora}</span></td>`;
                lWeb.appendChild(tr);

                // Renderização Mobile Próximos
                const card = document.createElement('div'); 
                card.className = 'game-card';
                card.innerHTML = `<div class="card-full"><span>${j.adversario || '---'}</span><span class="badge ${j.casaFora === 'Casa' ? 'badge-casa' : 'badge-fora'}">${j.casaFora}</span></div>
                                  <div class="info-item">📅 ${dt} - ${j.hora}</div>
                                  <div class="info-item">🏐 ${j.escalao}</div>
                                  <div class="info-item" style="color:#000000; font-weight:700">👤 ${j.treinador}</div>
                                  <div class="info-item">🏆 Comp: ${j.competicao || '-'}</div>
                                  <div class="info-item">🔢 Nº Jogo: ${j.numJogo || '-'}</div>
                                  <div class="info-item" style="grid-column: span 2; display:block; margin-top:5px;">🏠 Pav: ${j.pavilhao} ${j.mapsLink ? `<br><a href="${j.mapsLink}" target="_blank" class="maps-btn">📍 Rota Google Maps</a>` : ''}</div>`;
                lMob.appendChild(card);
            } else {
                cFin++;
                
                // Histórico Web
                const tr = document.createElement('tr'); tr.className = 'row-finalizado';
                tr.innerHTML = `<td style="background:${j.cor}; width:4px; max-width:4px; min-width:4px; opacity:0.5; padding:0; margin:0;"></td>
                                <td style="font-weight:bold; color:#555555">${j.treinador}</td>
                                <td>${j.escalao}</td>
                                <td><b>${j.adversario}</b><br><span class="resultado-tag">${j.setPro} - ${j.setContra}${parseInt(j.setPro)>parseInt(j.setContra) ? ' 🏆' : ''}</span><br><span class="parciais-tag">${j.parciais || ''}</span></td>
                                <td>${dt}</td>
                                <td>${j.pavilhao}</td>
                                <td><span class="badge badge-finalizado">Fim</span></td>`;
                hWeb.appendChild(tr);

                // Histórico Mobile
                const card = document.createElement('div'); card.className = 'game-card card-finalizado-mobile';
                card.innerHTML = `<div class="card-full"><span>${j.adversario}</span><span class="badge badge-finalizado">Fim</span></div>
                                  <div class="info-item">Res: <b>${j.setPro} - ${j.setContra}</b>${parseInt(j.setPro)>parseInt(j.setContra) ? ' 🏆' : ''}</div>
                                  <div class="info-item">📊 Parciais: ${j.parciais || '---'}</div>
                                  <div class="info-item" style="color:#555555">👤 ${j.treinador}</div>
                                  <div class="info-item">🏆 ${j.competicao || '-'} (Jor. ${j.jornada || '-'})</div>`;
                hMob.appendChild(card);
            }
        });
        
        document.getElementById('statTotal').innerText = cC+cF+cFin; 
        document.getElementById('statCasa').innerText = cC; 
        document.getElementById('statFora').innerText = cF; 
        document.getElementById('statFim').innerText = cFin;
    };

    window.onclick = (e) => { if (!e.target.closest('.multiselect-wrap')) { document.querySelectorAll('.multiselect-dropdown').forEach(el => el.classList.remove('show')); } };
</script>
</body>
</html>
