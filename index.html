<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acadêmicos - Gestão de Jogos</title>
    <style>
        :root { 
            --primary: #1a2a3a; 
            --accent: #3498db; 
            --error: #e74c3c; 
            --success: #27ae60; 
            --bg: #cbd5e0; 
            --finished-bg: #cbd5e0; 
            --finished-text: #475569;
        }
        
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        
        #loginScreen { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 320px; }
        .login-logo { max-width: 150px; margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto; }
        .login-box input, .login-box button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; box-sizing: border-box; }
        .login-box button { background: var(--accent); color: white; border: none; cursor: pointer; font-weight: bold; }
        
        .main-content { width: 98%; max-width: 1400px; margin: 15px auto; display: none; }
        .container { background: #f1f3f5; padding: 20px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); margin-bottom: 30px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #dee2e6; padding-bottom: 10px; }
        .header-logo { max-height: 45px; margin-right: 15px; }

        .collapsible-trigger {
            width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px;
            cursor: pointer; text-align: left; font-weight: 800; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
        }
        .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; margin-bottom: 0; }
        .collapsible-content.active { max-height: 1200px; margin-bottom: 20px; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #ffffff; padding: 12px; border-radius: 10px; border-left: 5px solid var(--accent); text-align: center; }
        .stat-card p { margin: 5px 0 0; font-size: 20px; font-weight: 800; color: var(--primary); }
        
        .form-grid, .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; background: #ffffff; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .filter-grid { background: #eef2f7; border-color: #d1d9e6; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; gap: 4px; }
        .field label { font-size: 11px; font-weight: bold; color: #475569; }
        input, select { padding: 10px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 13px; background: #ffffff; }
        
        .btn-marcar { grid-column: 1 / -1; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-atualizar { background: #e67e22 !important; }
        
        /* ESTILO WEB (TABELA) */
        .table-wrapper { background: #ffffff; border-radius: 12px; border: 1px solid #e2e8f0; overflow-x: auto; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #f8fafc; padding: 12px 10px; text-align: left; color: #64748b; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }

        /* ESTILO CARDS (MOBILE) */
        #listaMobile, #listaHistoricoMobile { display: none; flex-direction: column; gap: 15px; }
        .game-card { background: white; border-radius: 15px; padding: 15px; border: 1px solid #e2e8f0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .game-card .card-header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .game-card .game-title { font-weight: 800; font-size: 16px; color: var(--primary); }
        .game-card .info-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #4a5568; }
        .game-card .card-actions { grid-column: 1 / -1; display: flex; gap: 10px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        .btn-mobile { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e0; background: white; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 5px; font-size: 12px; }

        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .badge-casa { background: #d0ebff; color: #1971c2; }
        .badge-fora { background: #ffe3e3; color: #c92a2a; }
        .badge-finalizado { background: #94a3b8; color: white; }
        .row-conflito { background-color: #ffe3e3 !important; border-left: 8px solid var(--error) !important; }
        .conflito-card { border-left: 6px solid var(--error); background: #fff5f5; }

        @media screen and (max-width: 1024px) {
            .table-wrapper { display: none; }
            #listaMobile, #listaHistoricoMobile { display: flex; }
            .form-grid, .filter-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            header { flex-direction: column; text-align: center; gap: 10px; }
        }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box">
        <img src="academicos.png" alt="Logo" class="login-logo">
        <input type="text" id="userIn" placeholder="Usuário"><input type="password" id="passIn" placeholder="Senha">
        <button onclick="checkLogin()">Entrar</button>
    </div>
</div>

<div class="main-content" id="app">
    <div class="container">
        <header>
            <div style="display: flex; align-items: center;">
                <img src="academicos.png" alt="Logo" class="header-logo">
                <h2 style="margin:0; color: var(--primary); font-size: 1.1rem;">FC Académicos - Gestão</h2>
            </div>
            <button onclick="location.reload()" style="cursor:pointer; padding: 6px 12px; border-radius: 8px; border: 1px solid #cbd5e0; background: white; font-weight: 600;">Sair</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card"><h3>Total</h3><p id="statTotal">0</p></div>
            <div class="stat-card" style="border-left-color: #3498db;"><h3>Casa</h3><p id="statCasa">0</p></div>
            <div class="stat-card" style="border-left-color: #e67e22;"><h3>Fora</h3><p id="statFora">0</p></div>
            <div class="stat-card" style="border-left-color: var(--success);"><h3>Fim</h3><p id="statFim">0</p></div>
        </div>

        <button class="collapsible-trigger" onclick="toggleSection('formAgendamento')">
            <span>➕ NOVO AGENDAMENTO DE JOGO</span> <span id="formAgendamentoIcon">▼</span>
        </button>
        <div id="formAgendamento" class="collapsible-content">
            <div class="form-grid">
                <div class="field"><label>Treinador</label>
                    <select id="treinador">
                        <option value="">Selecione...</option><option value="Jorge Torres">Jorge Torres</option><option value="Amanda González">Amanda González</option><option value="Pedro Carvalho">Pedro Carvalho</option><option value="Inês Ferreira">Inês Ferreira</option><option value="Hamilton Júnior">Hamilton Júnior</option><option value="Ricardo Pereira">Ricardo Pereira</option><option value="Ricardo Magno">Ricardo Magno</option><option value="Pedro Pavezzi">Pedro Pavezzi</option><option value="Carlos Louro">Carlos Louro</option><option value="Cristina Cortez">Cristina Cortez</option><option value="Bruno Pereira">Bruno Pereira</option><option value="Pablo Romero">Pablo Romero</option><option value="Hélder Serrão">Hélder Serrão</option><option value="Carlos Martins">Carlos Martins</option>
                    </select>
                </div>
                <div class="field"><label>Cor</label><input type="color" id="cor" value="#3498db"></div>
                <div class="field"><label>Localização</label><select id="casaFora" onchange="togglePavilionField()"><option value="Casa">Casa 🏠</option><option value="Fora">Fora 🚌</option></select></div>
                <div class="field"><label>Data</label><input type="date" id="data"></div>
                <div class="field"><label>Hora</label><input type="time" id="hora"></div>
                <div class="field"><label>Comp.</label><input type="text" id="competicao"></div>
                <div class="field"><label>Jor.</label><input type="text" id="jornada"></div>
                <div class="field"><label>Nº Jogo</label><input type="number" id="numJogo"></div>
                <div class="field"><label>Escalão</label>
                    <select id="escalao">
                        <option value="">Selecione...</option><option value="Infantis A Fem">Infantis A Fem</option><option value="Infantis B Fem">Infantis B Fem</option><option value="Infantis C Fem">Infantis C Fem</option><option value="Iniciados A Fem">Iniciados A Fem</option><option value="Iniciados B Fem">Iniciados B Fem</option><option value="Iniciados Masc">Iniciados Masc</option><option value="Cadetes Fem">Cadetes Fem</option><option value="Cadetes Masc">Cadetes Masc</option><option value="Juvenis A Fem">Juvenis A Fem</option><option value="Juvenis B Fem">Juvenis B Fem</option><option value="Juvenis Masc">Juvenis Masc</option><option value="Sub21 Fem">Sub21 Fem</option><option value="Séniores Fem">Séniores Fem</option><option value="Séniores Masc">Séniores Masc</option><option value="Veteranos +35 Masc">Veteranos +35 Masc</option><option value="Veteranos +45 Masc">Veteranos +45 Masc</option>
                    </select>
                </div>
                <div class="field"><label>Adversário</label><input type="text" id="adversario"></div>
                <div class="field" id="pavilhaoContainer"><label>Pavilhão</label><select id="pavilhao"><option value="ES ALCAIDES FARIA">ES ALCAIDES FARIA</option><option value="MUNICIPAL DE ADÃES">MUNICIPAL DE ADÃES</option></select></div>
                <div class="field" id="boxSetPro" style="display:none;"><label>Set Pró</label><input type="number" id="setPro" value="0"></div>
                <div class="field" id="boxSetContra" style="display:none;"><label>Set Contra</label><input type="number" id="setContra" value="0"></div>
                <div class="field" id="boxParciais" style="display:none; grid-column: 1 / -1;"><label>Parciais</label><input type="text" id="parciais"></div>
                <button class="btn-marcar" id="btnSalvar" onclick="salvarJogo()">Agendar Jogo</button>
            </div>
        </div>

        <div class="filter-grid">
            <div class="field"><label>🔍 Treinador</label><select id="filterTreinador" onchange="render()"><option value="">Todos</option></select></div>
            <div class="field"><label>🔍 Escalão</label><select id="filterEscalao" onchange="render()"><option value="">Todos</option></select></div>
            <div class="field"><label>🔍 Data</label><input type="date" id="filterData" onchange="render()"></div>
            <div class="field"><label>🔍 Mês</label><select id="filterMes" onchange="render()"><option value="">Todos</option><option value="01">Jan</option><option value="02">Fev</option><option value="03">Mar</option><option value="04">Abr</option><option value="05">Mai</option><option value="06">Jun</option><option value="07">Jul</option><option value="08">Ago</option><option value="09">Set</option><option value="10">Out</option><option value="11">Nov</option><option value="12">Dez</option></select></div>
            <div class="field"><label>🔍 Local</label><select id="filterLocal" onchange="handleFilterLocalChange()"><option value="">Todos</option><option value="Casa">Casa</option><option value="Fora">Fora</option></select></div>
            <div class="field" id="filterPavilhaoContainer" style="display:none;"><label>🔍 Pavilhão</label><select id="filterPavilhao" onchange="render()"><option value="">Todos</option><option value="ES ALCAIDES FARIA">ES ALCAIDES FARIA</option><option value="MUNICIPAL DE ADÃES">MUNICIPAL DE ADÃES</option></select></div>
            <div style="display: flex; align-items: flex-end;"><button onclick="window.print()" style="padding: 10px 15px; cursor:pointer; background: #55acee; color: white; border:none; border-radius: 8px; font-weight:bold;">🖨️ PDF</button></div>
        </div>

        <h3 class="secao-titulo">Próximos Jogos</h3>
        <div class="table-wrapper"><table><thead><tr><th></th><th>Treinador</th><th>Comp.</th><th>Jor.</th><th>Nº</th><th>Escalão</th><th>Adversário</th><th>Data/Hora</th><th>Pavilhão</th><th>Tipo</th><th>Ações</th></tr></thead><tbody id="listaWeb"></tbody></table></div>
        <div id="listaMobile"></div>

        <button class="collapsible-trigger" onclick="toggleSection('historicoSection')" style="background: var(--finished-text); margin-top: 20px;">
            <span>📜 HISTÓRICO DE JOGOS</span> <span id="historicoSectionIcon">▼</span>
        </button>
        <div id="historicoSection" class="collapsible-content">
            <div class="table-wrapper"><table><tbody id="listaHistoricoWeb"></tbody></table></div>
            <div id="listaHistoricoMobile"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyB86TeZnp2qdOXXwjvD3hFfzTi3Z3NkVMc", authDomain: "academicos-d2cfc.firebaseapp.com", projectId: "academicos-d2cfc", storageBucket: "academicos-d2cfc.firebasestorage.app", messagingSenderId: "550824625713", appId: "1:550824625713:web:f3194f8e4f06dc141a3710" };
    const app = initializeApp(firebaseConfig); const db = getFirestore(app); const jogosCol = collection(db, "jogos");
    let jogosAtuais = []; let editId = null;

    window.toggleSection = (id) => { const c = document.getElementById(id); const icon = document.getElementById(id+'Icon'); c.classList.toggle('active'); icon.innerText = c.classList.contains('active') ? '▲' : '▼'; };
    window.checkLogin = () => { if(document.getElementById('userIn').value==='academicos' && document.getElementById('passIn').value==='academicos2026'){ document.getElementById('loginScreen').style.display='none'; document.getElementById('app').style.display='block'; carregarJogos(); popularFiltros(); } else alert("Erro!"); };
    function popularFiltros() { const t = document.getElementById('treinador').innerHTML; const e = document.getElementById('escalao').innerHTML; document.getElementById('filterTreinador').innerHTML = '<option value="">Treinador</option>'+t; document.getElementById('filterEscalao').innerHTML = '<option value="">Escalão</option>'+e; }

    window.handleFilterLocalChange = () => { const l = document.getElementById('filterLocal').value; document.getElementById('filterPavilhaoContainer').style.display = (l==='Casa') ? 'flex' : 'none'; render(); };
    window.togglePavilionField = () => { const l = document.getElementById('casaFora').value; document.getElementById('pavilhaoContainer').innerHTML = (l==='Casa') ? `<label>Pavilhão</label><select id="pavilhao"><option value="ES ALCAIDES FARIA">ES ALCAIDES FARIA</option><option value="MUNICIPAL DE ADÃES">MUNICIPAL DE ADÃES</option></select>` : `<label>Pavilhão</label><input type="text" id="pavilhao" placeholder="Pavilhão">`; };

    window.salvarJogo = async () => {
        const d = { treinador: document.getElementById('treinador').value, cor: document.getElementById('cor').value, casaFora: document.getElementById('casaFora').value, data: document.getElementById('data').value, hora: document.getElementById('hora').value, competicao: document.getElementById('competicao').value, jornada: document.getElementById('jornada').value, numJogo: document.getElementById('numJogo').value, escalao: document.getElementById('escalao').value, adversario: document.getElementById('adversario').value, pavilhao: document.getElementById('pavilhao').value, setPro: document.getElementById('setPro').value||0, setContra: document.getElementById('setContra').value||0, parciais: document.getElementById('parciais').value||'', finalizado: editId ? (jogosAtuais.find(x=>x.id===editId).finalizado||false) : false };
        try { if(editId) { await updateDoc(doc(db, "jogos", editId), d); editId=null; } else await addDoc(jogosCol, d); limpar(); document.getElementById('formAgendamento').classList.remove('active'); } catch(e) { alert("Erro!"); }
    };

    window.finalizarJogoPrompt = (id) => { if(prompt("Senha:")==="academicos2026") { const sp=prompt("Sets Pró:","0"), sc=prompt("Sets Contra:","0"), pa=prompt("Parciais:",""); updateDoc(doc(db,"jogos",id),{finalizado:true,setPro:sp,setContra:sc,parciais:pa}); } };
    function carregarJogos() { onSnapshot(query(jogosCol, orderBy("data"), orderBy("hora")), (s) => { jogosAtuais = s.docs.map(d => ({id:d.id, ...d.data()})); render(); }); }

    window.render = () => {
        const lWeb = document.getElementById('listaWeb'), lMob = document.getElementById('listaMobile');
        const hWeb = document.getElementById('listaHistoricoWeb'), hMob = document.getElementById('listaHistoricoMobile');
        const fT = document.getElementById('filterTreinador').value, fE = document.getElementById('filterEscalao').value, fL = document.getElementById('filterLocal').value, fD = document.getElementById('filterData').value, fM = document.getElementById('filterMes').value, fP = document.getElementById('filterPavilhao').value;
        
        lWeb.innerHTML=''; lMob.innerHTML=''; hWeb.innerHTML=''; hMob.innerHTML='';
        const agora = new Date(); let cC=0, cF=0, cFin=0;

        jogosAtuais.forEach(j => {
            if(fT && j.treinador!==fT) return; if(fE && j.escalao!==fE) return; if(fL && j.casaFora!==fL) return; if(fD && j.data!==fD) return; if(fM && j.data && j.data.split('-')[1]!==fM) return; if(fL==='Casa' && fP && j.pavilhao!==fP) return;

            const isWin = parseInt(j.setPro) > parseInt(j.setContra);
            const dataFormat = j.data ? j.data.split('-').reverse().join('/') : '-';
            const isPassado = j.data && j.hora && (agora > new Date(`${j.data}T${j.hora}`));

            if(!j.finalizado) {
                if(j.casaFora==='Casa') cC++; else cF++;
                // WEB
                const tr = document.createElement('tr');
                tr.innerHTML = `<td style="background:${j.cor};width:8px;"></td><td>${j.treinador}</td><td>${j.competicao||'-'}</td><td>${j.jornada||'-'}</td><td>${j.numJogo||'-'}</td><td>${j.escalao}</td><td>${j.adversario}</td><td>${dataFormat} às ${j.hora}</td><td>${j.pavilhao}</td><td><span class="badge ${j.casaFora==='Casa'?'badge-casa':'badge-fora'}">${j.casaFora}</span>${isPassado ? `<br><button style="background:var(--accent);color:white;border:none;padding:4px;border-radius:4px;font-size:10px;cursor:pointer;" onclick="finalizarJogoPrompt('${j.id}')">🏁 Finalizar</button>` : ''}</td><td><button onclick="prepararEdicao('${j.id}')">✏️</button> <button onclick="eliminarJogo('${j.id}')">🗑️</button></td>`;
                lWeb.appendChild(tr);
                // MOBILE
                const card = document.createElement('div'); card.className = 'game-card';
                card.innerHTML = `<div class="card-full"><span>${j.adversario}</span><span class="badge badge-casa">Agendado</span></div><div class="info-item">📅 ${dataFormat} - ${j.hora}</div><div class="info-item">🏐 ${j.escalao}</div><div class="info-item" style="color:${j.cor}">👤 ${j.treinador}</div><div class="info-item">📍 ${j.pavilhao}</div><div class="card-actions"><button class="btn-mobile" onclick="prepararEdicao('${j.id}')">✏️ Editar</button>${isPassado ? `<button class="btn-mobile" style="background:var(--accent);color:white;" onclick="finalizarJogoPrompt('${j.id}')">🏁 Finalizar</button>` : ''}</div>`;
                lMob.appendChild(card);
            } else {
                cFin++;
                // WEB
                const tr = document.createElement('tr'); tr.className = 'row-finalizado';
                tr.innerHTML = `<td style="background:${j.cor};width:8px;opacity:0.5;"></td><td>${j.treinador}</td><td>${j.competicao||'-'}</td><td>${j.jornada||'-'}</td><td>${j.numJogo||'-'}</td><td>${j.escalao}</td><td>${j.adversario} (${j.setPro}-${j.setContra}) ${isWin?'🏆':''}</td><td>${dataFormat}</td><td>${j.pavilhao}</td><td><span class="badge badge-finalizado">Fim</span></td><td><button onclick="prepararEdicao('${j.id}')">✏️</button></td>`;
                hWeb.appendChild(tr);
                // MOBILE
                const card = document.createElement('div'); card.className = 'game-card'; card.style.opacity="0.8";
                card.innerHTML = `<div class="card-full"><span>${j.adversario}</span><span class="badge badge-finalizado">Fim</span></div><div class="info-item">🏆 Resultado: ${j.setPro} - ${j.setContra} ${isWin?'🏆':''}</div><div class="info-item">🏐 ${j.escalao}</div><div class="card-actions"><button class="btn-mobile" onclick="prepararEdicao('${j.id}')">✏️ Editar</button></div>`;
                hMob.appendChild(card);
            }
        });
        document.getElementById('statTotal').innerText = cC+cF+cFin; document.getElementById('statCasa').innerText = cC; document.getElementById('statFora').innerText = cF; document.getElementById('statFim').innerText = cFin;
    };

    window.prepararEdicao = (id) => {
        const j = jogosAtuais.find(x => x.id === id); document.getElementById('treinador').value = j.treinador; document.getElementById('cor').value = j.cor; document.getElementById('casaFora').value = j.casaFora; window.togglePavilionField(); 
        document.getElementById('data').value = j.data; document.getElementById('hora').value = j.hora; document.getElementById('competicao').value = j.competicao||''; document.getElementById('jornada').value = j.jornada||''; document.getElementById('numJogo').value = j.numJogo||''; document.getElementById('escalao').value = j.escalao; document.getElementById('adversario').value = j.adversario; document.getElementById('pavilhao').value = j.pavilhao;
        document.getElementById('boxSetPro').style.display = 'block'; document.getElementById('boxSetContra').style.display = 'block'; document.getElementById('boxParciais').style.display = 'block'; document.getElementById('setPro').value = j.setPro||0; document.getElementById('setContra').value = j.setContra||0; document.getElementById('parciais').value = j.parciais||'';
        document.getElementById('btnSalvar').innerText = "Atualizar"; document.getElementById('formAgendamento').classList.add('active'); editId = id; window.scrollTo(0,0);
    };

    window.eliminarJogo = async (id) => { if (prompt("Senha:") === "academicos2026") await deleteDoc(doc(db, "jogos", id)); };
    function limpar() { ['data','hora','competicao','jornada','numJogo','adversario','setPro', 'setContra', 'parciais'].forEach(id => document.getElementById(id).value = ''); document.getElementById('btnSalvar').innerText = "Agendar Jogo"; }
</script>
</body>
</html>
