<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acadêmicos - Gestão de Jogos</title>
    <style>
        :root { 
            --primary: #1a2a3a; --accent: #3498db; --error: #e74c3c; 
            --success: #27ae60; --bg: #cbd5e0; --finished-bg: #cbd5e0; --finished-text: #475569;
        }
        
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        
        #loginScreen { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 40px; border-radius: 12px; text-align: center; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .login-box input, .login-box button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; box-sizing: border-box; }
        .login-box button { background: var(--accent); color: white; border: none; cursor: pointer; font-weight: bold; }
        
        .main-content { width: 98%; max-width: 1400px; margin: 15px auto; display: none; }
        .container { background: #f1f3f5; padding: 20px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); margin-bottom: 30px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #dee2e6; padding-bottom: 10px; }
        .header-logo { max-height: 45px; margin-right: 15px; }

        .collapsible-trigger {
            width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px;
            cursor: pointer; text-align: left; font-weight: 800; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
        }
        .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; margin-bottom: 0; }
        .collapsible-content.active { max-height: none; margin-bottom: 20px; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #ffffff; padding: 12px; border-radius: 10px; border-left: 5px solid var(--accent); text-align: center; }
        .stat-card p { margin: 5px 0 0; font-size: 20px; font-weight: 800; color: var(--primary); }
        
        .form-grid, .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; background: #ffffff; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .filter-grid { background: #eef2f7; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; gap: 4px; }
        .field label { font-size: 11px; font-weight: bold; color: #475569; }
        input, select { padding: 10px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 13px; background: #ffffff; }
        
        .btn-group { grid-column: 1 / -1; display: flex; gap: 10px; }
        .btn-marcar { flex: 2; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: background 0.3s; }
        .btn-marcar:hover { background: #2c3e50; }
        
        .btn-cancelar { flex: 1; padding: 15px; background: #94a3b8; color: white; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; text-transform: uppercase; display: none; transition: background 0.3s; }
        .btn-cancelar:hover { background: #64748b; }
        
        .btn-atualizar { background: #e67e22 !important; }
        .btn-atualizar:hover { background: #d35400 !important; }
        
        .table-wrapper { background: #ffffff; border-radius: 12px; border: 1px solid #e2e8f0; overflow-x: auto; margin-bottom: 20px; }
        .historico-wrapper { background: var(--finished-bg) !important; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #f8fafc; padding: 12px 10px; text-align: left; color: #64748b; font-size: 11px; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        .row-finalizado td { background-color: var(--finished-bg) !important; color: var(--finished-text) !important; }

        .mobile-list { display: none; flex-direction: column; gap: 12px; }
        .game-card { background: white; border-radius: 15px; padding: 15px; border: 1px solid #e2e8f0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card-finalizado-mobile { background: #d1d5db !important; border-color: #94a3b8 !important; opacity: 0.9; }
        .card-full { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 8px; font-weight: 800; color: var(--primary); }
        .info-item { font-size: 12px; color: #4a5568; display: flex; align-items: center; gap: 8px; }
        .card-actions { grid-column: 1 / -1; display: flex; gap: 10px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        .btn-mobile { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e0; background: white; font-weight: 600; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 12px; }

        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .badge-casa { background: #d0ebff; color: #1971c2; }
        .badge-fora { background: #ffe3e3; color: #c92a2a; }
        .badge-finalizado { background: #94a3b8; color: white; }
        .row-conflito { background-color: #ffe3e3 !important; border-left: 8px solid var(--error) !important; }
        .conflito-card { border-left: 6px solid var(--error); background: #fff5f5; }
        .win-icon { color: #f1c40f; }
        
        /* Estilo do ícone de mapa */
        .maps-link { text-decoration: none; font-size: 18px; cursor: pointer; margin-left: 5px; }

        @media screen and (min-width: 1025px) {
            .table-wrapper { display: block !important; }
            .mobile-list { display: none !important; }
        }

        @media screen and (max-width: 1024px) {
            .table-wrapper { display: none !important; }
            .mobile-list { display: flex !important; }
            .form-grid, .filter-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            header { flex-direction: column; text-align: center; gap: 10px; }
        }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box">
        <img src="academicos.png" alt="Logo" style="max-width:150px; margin-bottom:20px;">
        <input type="text" id="userIn" placeholder="Usuário"><input type="password" id="passIn" placeholder="Senha">
        <button onclick="checkLogin()">Entrar</button>
    </div>
</div>

<div class="main-content" id="app">
    <div class="container">
        <header>
            <div style="display: flex; align-items: center;">
                <img src="academicos.png" alt="Logo" class="header-logo">
                <h2 style="margin:0; color: var(--primary);">FC Académicos</h2>
            </div>
            <button onclick="location.reload()" style="padding: 8px 12px; border-radius: 8px; cursor:pointer;">Sair</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card"><h3>Total</h3><p id="statTotal">0</p></div>
            <div class="stat-card" style="border-left-color: #3498db;"><h3>Casa</h3><p id="statCasa">0</p></div>
            <div class="stat-card" style="border-left-color: #e67e22;"><h3>Fora</h3><p id="statFora">0</p></div>
            <div class="stat-card" style="border-left-color: var(--success);"><h3>Fim</h3><p id="statFim">0</p></div>
        </div>

        <button class="collapsible-trigger" onclick="toggleSection('formAgendamento')">
            <span>➕ NOVO AGENDAMENTO</span> <span id="formAgendamentoIcon">▼</span>
        </button>
        <div id="formAgendamento" class="collapsible-content">
            <div class="form-grid">
                <div class="field"><label>Treinador</label>
                    <select id="treinador">
                        <option value="">Selecione...</option><option value="Jorge Torres">Jorge Torres</option><option value="Amanda González">Amanda González</option><option value="Pedro Carvalho">Pedro Carvalho</option><option value="Inês Ferreira">Inês Ferreira</option><option value="Hamilton Júnior">Hamilton Júnior</option><option value="Ricardo Pereira">Ricardo Pereira</option><option value="Ricardo Magno">Ricardo Magno</option><option value="Pedro Pavezzi">Pedro Pavezzi</option><option value="Carlos Louro">Carlos Louro</option><option value="Cristina Cortez">Cristina Cortez</option><option value="Bruno Pereira">Bruno Pereira</option><option value="Pablo Romero">Pablo Romero</option><option value="Hélder Serrão">Hélder Serrão</option><option value="Carlos Martins">Carlos Martins</option>
                    </select>
                </div>
                <div class="field"><label>Cor</label><input type="color" id="cor" value="#3498db"></div>
                <div class="field"><label>Local</label><select id="casaFora" onchange="togglePavilionField()"><option value="Casa">Casa 🏠</option><option value="Fora">Fora 🚌</option></select></div>
                <div class="field"><label>Data</label><input type="date" id="data"></div>
                <div class="field"><label>Hora</label><input type="time" id="hora"></div>
                <div class="field"><label>Comp.</label><input type="text" id="competicao"></div>
                <div class="field"><label>Jor.</label><input type="text" id="jornada"></div>
                <div class="field"><label>Nº Jogo</label><input type="number" id="numJogo"></div>
                <div class="field"><label>Escalão</label>
                    <select id="escalao">
                        <option value="">Selecione...</option><option value="Infantis A Fem">Infantis A Fem</option><option value="Infantis B Fem">Infantis B Fem</option><option value="Infantis C Fem">Infantis C Fem</option><option value="Iniciados A Fem">Iniciados A Fem</option><option value="Iniciados B Fem">Iniciados B Fem</option><option value="Iniciados Masc">Iniciados Masc</option><option value="Cadetes Fem">Cadetes Fem</option><option value="Cadetes Masc">Cadetes Masc</option><option value="Juvenis A Fem">Juvenis A Fem</option><option value="Juvenis B Fem">Juvenis B Fem</option><option value="Juvenis Masc">Juvenis Masc</option><option value="Sub21 Fem">Sub21 Fem</option><option value="Séniores Fem">Séniores Fem</option><option value="Séniores Masc">Séniores Masc</option><option value="Veteranos +35 Masc">Veteranos +35 Masc</option><option value="Veteranos +45 Masc">Veteranos +45 Masc</option>
                    </select>
                </div>
                <div class="field"><label>Adversário</label><input type="text" id="adversario"></div>
                <div class="field" id="pavilhaoContainer"><label>Pavilhão</label><select id="pavilhao"><option value="ES ALCAIDES FARIA">ES ALCAIDES FARIA</option><option value="MUNICIPAL DE ADÃES">MUNICIPAL DE ADÃES</option></select></div>
                <div class="field" id="mapsContainer" style="display:none;"><label>Link Google Maps</label><input type="text" id="mapsLink" placeholder="Cole o link da rota aqui"></div>
                
                <div class="field" id="boxSetPro" style="display:none;"><label>Set Pró</label><input type="number" id="setPro" value="0"></div>
                <div class="field" id="boxSetContra" style="display:none;"><label>Set Contra</label><input type="number" id="setContra" value="0"></div>
                <div class="field" id="boxParciais" style="display:none; grid-column: 1 / -1;"><label>Parciais</label><input type="text" id="parciais"></div>
                <div class="btn-group">
                    <button class="btn-marcar" id="btnSalvar" onclick="salvarJogo()">Agendar Jogo</button>
                    <button class="btn-cancelar" id="btnCancelar" onclick="limpar()">Cancelar</button>
                </div>
            </div>
        </div>

        <div class="filter-grid">
            <div class="field"><label>🔍 Treinador</label><select id="filterTreinador" onchange="render()"><option value="">Todos</option></select></div>
            <div class="field"><label>🔍 Escalão</label><select id="filterEscalao" onchange="render()"><option value="">Todos</option></select></div>
            <div class="field"><label>🔍 Data</label><input type="date" id="filterData" onchange="render()"></div>
            <div class="field"><label>🔍 Local</label><select id="filterLocal" onchange="handleFilterLocalChange()"><option value="">Todos</option><option value="Casa">Casa</option><option value="Fora">Fora</option></select></div>
            <div class="field" id="filterPavilhaoContainer" style="display:none;"><label>🔍 Pavilhão</label><select id="filterPavilhao" onchange="render()"><option value="">Todos</option><option value="ES ALCAIDES FARIA">ES ALCAIDES FARIA</option><option value="MUNICIPAL DE ADÃES">MUNICIPAL DE ADÃES</option></select></div>
            <div style="display: flex; align-items: flex-end;"><button onclick="window.print()" style="padding: 10px 15px; cursor:pointer; background: #55acee; color: white; border:none; border-radius: 8px; font-weight:bold;">🖨️ PDF</button></div>
        </div>

        <h3 class="secao-titulo">Próximos Jogos</h3>
        <div class="table-wrapper"><table><thead><tr><th></th><th>Treinador</th><th>Comp.</th><th>Jor.</th><th>Nº</th><th>Escalão</th><th>Adversário</th><th>Data/Hora</th><th>Pavilhão</th><th>Local</th><th>Ações</th></tr></thead><tbody id="listaWeb"></tbody></table></div>
        <div id="listaMobile" class="mobile-list"></div>

        <button class="collapsible-trigger" onclick="toggleSection('historicoContainer')" style="background: var(--finished-text); margin-top: 20px;">
            <span>📜 HISTÓRICO DE JOGOS</span> <span id="historicoContainerIcon">▼</span>
        </button>
        <div id="historicoContainer" class="collapsible-content">
            <div class="table-wrapper historico-wrapper"><table><thead><tr><th></th><th>Treinador</th><th>Comp.</th><th>Jor.</th><th>Nº</th><th>Escalão</th><th>Adversário/Res.</th><th>Data/Hora</th><th>Pavilhão</th><th>Status</th><th>Ações</th></tr></thead><tbody id="listaHistoricoWeb"></tbody></table></div>
            <div id="listaHistoricoMobile" class="mobile-list"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyB86TeZnp2qdOXXwjvD3hFfzTi3Z3NkVMc", authDomain: "academicos-d2cfc.firebaseapp.com", projectId: "academicos-d2cfc", storageBucket: "academicos-d2cfc.firebasestorage.app", messagingSenderId: "550824625713", appId: "1:550824625713:web:f3194f8e4f06dc141a3710" };
    const app = initializeApp(firebaseConfig); const db = getFirestore(app); const jogosCol = collection(db, "jogos");
    let jogosAtuais = []; let editId = null;

    window.toggleSection = (id) => {
        const c = document.getElementById(id); const icon = document.getElementById(id + 'Icon');
        c.classList.toggle('active'); icon.innerText = c.classList.contains('active') ? '▲' : '▼';
    };

    window.checkLogin = () => { if(document.getElementById('userIn').value === 'academicos' && document.getElementById('passIn').value === 'academicos2026') { document.getElementById('loginScreen').style.display = 'none'; document.getElementById('app').style.display = 'block'; carregarJogos(); popularFiltros(); } else { alert("Senha incorreta!"); } };
    function popularFiltros() { const tSel = document.getElementById('treinador').innerHTML; const eSel = document.getElementById('escalao').innerHTML; document.getElementById('filterTreinador').innerHTML = '<option value="">Treinadores</option>' + tSel; document.getElementById('filterEscalao').innerHTML = '<option value="">Escalões</option>' + eSel; }

    window.handleFilterLocalChange = () => { const local = document.getElementById('filterLocal').value; document.getElementById('filterPavilhaoContainer').style.display = (local === 'Casa') ? 'flex' : 'none'; render(); };
    
    window.togglePavilionField = () => { 
        const local = document.getElementById('casaFora').value; 
        const pCont = document.getElementById('pavilhaoContainer');
        const mCont = document.getElementById('mapsContainer');
        if(local === 'Casa') {
            pCont.innerHTML = `<label>Pavilhão</label><select id="pavilhao"><option value="ES ALCAIDES FARIA">ES ALCAIDES FARIA</option><option value="MUNICIPAL DE ADÃES">MUNICIPAL DE ADÃES</option></select>`;
            mCont.style.display = 'none';
        } else {
            pCont.innerHTML = `<label>Pavilhão</label><input type="text" id="pavilhao" placeholder="Nome pavilhão">`;
            mCont.style.display = 'flex';
        }
    };

    window.salvarJogo = async () => {
        const dados = { 
            treinador: document.getElementById('treinador').value, 
            cor: document.getElementById('cor').value, 
            casaFora: document.getElementById('casaFora').value, 
            data: document.getElementById('data').value, 
            hora: document.getElementById('hora').value, 
            competicao: document.getElementById('competicao').value, 
            jornada: document.getElementById('jornada').value, 
            numJogo: document.getElementById('numJogo').value, 
            escalao: document.getElementById('escalao').value, 
            adversario: document.getElementById('adversario').value, 
            pavilhao: document.getElementById('pavilhao').value, 
            mapsLink: document.getElementById('mapsLink')?.value || '',
            setPro: document.getElementById('setPro').value || 0, 
            setContra: document.getElementById('setContra').value || 0, 
            parciais: document.getElementById('parciais').value || '', 
            finalizado: editId ? (jogosAtuais.find(x => x.id === editId).finalizado || false) : false 
        };
        try { if(editId) { await updateDoc(doc(db, "jogos", editId), dados); editId = null; } else { await addDoc(jogosCol, dados); } limpar(); document.getElementById('formAgendamento').classList.remove('active'); } catch (e) { alert("Erro ao salvar!"); }
    };

    window.finalizarJogoPrompt = (id) => { if (prompt("Senha:") === "academicos2026") { const sp = prompt("Sets Pró:", "0"); const sc = prompt("Sets Contra:", "0"); const pa = prompt("Parciais:", ""); updateDoc(doc(db, "jogos", id), { finalizado: true, setPro: sp, setContra: sc, parciais: pa }); } };
    function carregarJogos() { onSnapshot(query(jogosCol, orderBy("data"), orderBy("hora")), (snapshot) => { jogosAtuais = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })); render(); }); }

    window.render = () => {
        const lWeb = document.getElementById('listaWeb'); const lMob = document.getElementById('listaMobile');
        const hWeb = document.getElementById('listaHistoricoWeb'); const hMob = document.getElementById('listaHistoricoMobile');
        const f = { t: document.getElementById('filterTreinador').value, e: document.getElementById('filterEscalao').value, l: document.getElementById('filterLocal').value, d: document.getElementById('filterData').value, p: document.getElementById('filterPavilhao').value };
        
        lWeb.innerHTML = ''; lMob.innerHTML = ''; hWeb.innerHTML = ''; hMob.innerHTML = '';
        const agora = new Date(); let cC = 0, cF = 0, cFin = 0;

        const ativos = jogosAtuais.filter(x => !x.finalizado);
        for (let a of ativos) {
            a.conflito = false;
            if (a.casaFora !== 'Casa') continue;
            for (let b of ativos) {
                if (a.id === b.id || b.casaFora !== 'Casa' || a.data !== b.data || a.pavilhao !== b.pavilhao) continue;
                let diff = Math.abs(new Date(a.data+'T'+a.hora) - new Date(b.data+'T'+b.hora)) / 60000;
                if (diff < 120) { a.conflito = true; }
            }
        }

        jogosAtuais.forEach(j => {
            if(f.t && j.treinador !== f.t) return; if(f.e && j.escalao !== f.e) return; if(f.l && j.casaFora !== f.l) return; if(f.d && j.data !== f.d) return; if(f.l === 'Casa' && f.p && j.pavilhao !== f.p) return;

            const isWin = parseInt(j.setPro) > parseInt(j.setContra);
            const dt = j.data ? j.data.split('-').reverse().join('/') : '-';
            const isPassado = j.data && j.hora && (agora > new Date(`${j.data}T${j.hora}`));
            const bL = j.casaFora === 'Casa' ? 'badge-casa' : 'badge-fora';
            const pinIcon = j.mapsLink ? `<a href="${j.mapsLink}" target="_blank" class="maps-link" title="Ver Rota no Mapa">🗺️</a>` : '';

            if(!j.finalizado) {
                if(j.casaFora === 'Casa') cC++; else cF++;
                const tr = document.createElement('tr'); if(j.conflito) tr.className = 'row-conflito';
                tr.innerHTML = `<td style="background:${j.cor}; width:8px;"></td><td style="font-weight:bold; color:${j.cor}">${j.treinador}</td><td>${j.competicao||'-'}</td><td>${j.jornada||'-'}</td><td>${j.numJogo||'-'}</td><td>${j.escalao}</td><td>${j.adversario || '---'}</td><td>${dt} às ${j.hora}${j.conflito ? '<br><span class="error-tag">⚠️ Conflito</span>' : ''}${isPassado ? `<br><button style="background:var(--accent);color:white;border:none;padding:4px;border-radius:4px;font-size:10px;cursor:pointer;" onclick="finalizarJogoPrompt('${j.id}')">🏁 Finalizar</button>` : ''}</td><td>${j.pavilhao} ${pinIcon}</td><td><span class="badge ${bL}">${j.casaFora}</span></td><td><button onclick="prepararEdicao('${j.id}')">✏️</button> <button onclick="eliminarJogo('${j.id}')">🗑️</button></td>`;
                lWeb.appendChild(tr);
                
                const card = document.createElement('div'); card.className = `game-card ${j.conflito ? 'conflito-card' : ''}`;
                card.innerHTML = `<div class="card-full"><span>${j.adversario || '---'}</span><span class="badge ${bL}">${j.casaFora}</span></div><div class="info-item">📅 ${dt} - ${j.hora}</div><div class="info-item">🏐 ${j.escalao}</div><div class="info-item" style="color:${j.cor}">👤 ${j.treinador}</div><div class="info-item">📍 ${j.pavilhao} ${pinIcon}</div>${j.conflito ? '<div class="info-item error-tag">⚠️ Conflito de Hora</div>' : ''}<div class="card-actions"><button class="btn-mobile" onclick="prepararEdicao('${j.id}')">✏️ Editar</button>${isPassado ? `<button class="btn-mobile" style="background:var(--accent);color:white;" onclick="finalizarJogoPrompt('${j.id}')">🏁 Finalizar</button>` : ''} <button class="btn-mobile" style="flex:0.3" onclick="eliminarJogo('${j.id}')">🗑️</button></div>`;
                lMob.appendChild(card);
            } else {
                cFin++;
                const tr = document.createElement('tr'); tr.className = 'row-finalizado';
                tr.innerHTML = `<td style="background:${j.cor}; width:8px; opacity:0.5;"></td><td style="font-weight:bold; color:${j.cor}">${j.treinador}</td><td>${j.competicao||'-'}</td><td>${j.jornada||'-'}</td><td>${j.numJogo||'-'}</td><td>${j.escalao}</td><td>${j.adversario}<br><span class="resultado-tag">${j.setPro} - ${j.setContra}${isWin ? '<span class="win-icon">🏆</span>' : ''}</span></td><td>${dt}</td><td>${j.pavilhao} ${pinIcon}</td><td><span class="badge badge-finalizado">Fim</span></td><td><button onclick="prepararEdicao('${j.id}')">✏️</button> <button onclick="eliminarJogo('${j.id}')">🗑️</button></td>`;
                hWeb.appendChild(tr);
                
                const card = document.createElement('div'); card.className = 'game-card card-finalizado-mobile';
                card.innerHTML = `<div class="card-full"><span>${j.adversario}</span><span class="badge badge-finalizado">Fim</span></div><div class="info-item">${isWin ? '<span class="win-icon" style="margin-right:5px;">🏆</span>' : ''} Res: ${j.setPro} - ${j.setContra}</div><div class="info-item">📊 Parciais: ${j.parciais || '---'}</div><div class="info-item" style="color:${j.cor}">👤 ${j.treinador}</div><div class="info-item">📍 ${j.pavilhao} ${pinIcon}</div><div class="card-actions"><button class="btn-mobile" onclick="prepararEdicao('${j.id}')">✏️ Editar</button> <button class="btn-mobile" style="flex:0.3" onclick="eliminarJogo('${j.id}')">🗑️</button></div>`;
                hMob.appendChild(card);
            }
        });
        document.getElementById('statTotal').innerText = cC+cF+cFin; document.getElementById('statCasa').innerText = cC; document.getElementById('statFora').innerText = cF; document.getElementById('statFim').innerText = cFin;
    };

    window.prepararEdicao = (id) => {
        const j = jogosAtuais.find(x => x.id === id); 
        document.getElementById('treinador').value = j.treinador; document.getElementById('cor').value = j.cor; 
        document.getElementById('casaFora').value = j.casaFora; window.togglePavilionField(); 
        document.getElementById('data').value = j.data; document.getElementById('hora').value = j.hora; 
        document.getElementById('competicao').value = j.competicao||''; document.getElementById('jornada').value = j.jornada||''; 
        document.getElementById('numJogo').value = j.numJogo||''; document.getElementById('escalao').value = j.escalao; 
        document.getElementById('adversario').value = j.adversario; document.getElementById('pavilhao').value = j.pavilhao;
        if(j.casaFora === 'Fora' && document.getElementById('mapsLink')) document.getElementById('mapsLink').value = j.mapsLink || '';

        document.getElementById('boxSetPro').style.display = 'block'; document.getElementById('boxSetContra').style.display = 'block'; 
        document.getElementById('boxParciais').style.display = 'block'; document.getElementById('setPro').value = j.setPro||0; 
        document.getElementById('setContra').value = j.setContra||0; document.getElementById('parciais').value = j.parciais||'';
        
        const bS = document.getElementById('btnSalvar'); bS.innerText = "Atualizar"; bS.classList.add("btn-atualizar");
        document.getElementById('btnCancelar').style.display = "block";
        document.getElementById('formAgendamento').classList.add('active'); editId = id; window.scrollTo(0,0);
    };

    window.eliminarJogo = async (id) => { if (prompt("Senha para eliminar:") === "academicos2026") await deleteDoc(doc(db, "jogos", id)); };
    
    window.limpar = () => { 
        ['data','hora','competicao','jornada','numJogo','adversario','setPro', 'setContra', 'parciais'].forEach(id => {
            const el = document.getElementById(id); if(el) el.value = '';
        });
        const ml = document.getElementById('mapsLink'); if(ml) ml.value = '';
        const bS = document.getElementById('btnSalvar'); bS.innerText = "Agendar Jogo"; bS.classList.remove("btn-atualizar");
        document.getElementById('btnCancelar').style.display = "none";
        document.getElementById('formAgendamento').classList.remove('active');
        editId = null;
    };
</script>
</body>
</html>
