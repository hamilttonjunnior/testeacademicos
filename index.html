<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acadêmicos - Gestão de Jogos</title>
    <style>
        :root { 
            --primary: #1a2a3a; 
            --accent: #3498db; 
            --error: #e74c3c; 
            --success: #27ae60; 
            --bg: #cbd5e0; 
            --finished-bg: #cbd5e0; 
            --finished-text: #475569;
        }
        
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        
        #loginScreen { position: fixed; inset: 0; background: var(--primary); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .login-box { background: white; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 320px; }
        .login-logo { max-width: 150px; margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto; }
        .login-box input, .login-box button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; box-sizing: border-box; }
        .login-box button { background: var(--accent); color: white; border: none; cursor: pointer; font-weight: bold; }
        
        .main-content { width: 98%; max-width: 1400px; margin: 15px auto; display: none; }
        .container { background: #f1f3f5; padding: 20px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); margin-bottom: 30px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #dee2e6; padding-bottom: 10px; }
        .header-logo { max-height: 45px; margin-right: 15px; }

        .collapsible-trigger {
            width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px;
            cursor: pointer; text-align: left; font-weight: 800; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
            transition: background 0.3s;
        }
        .collapsible-trigger:hover { background: #2c3e50; }
        
        .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; margin-bottom: 0; }
        .collapsible-content.active { max-height: 1200px; margin-bottom: 20px; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #ffffff; padding: 12px; border-radius: 10px; border-left: 5px solid var(--accent); text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .stat-card p { margin: 5px 0 0; font-size: 20px; font-weight: 800; color: var(--primary); }
        
        .form-grid, .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; background: #ffffff; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .filter-grid { background: #eef2f7; border-color: #d1d9e6; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; gap: 4px; }
        .field label { font-size: 11px; font-weight: bold; color: #475569; }
        input, select { padding: 10px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 13px; background: #ffffff; width: 100%; box-sizing: border-box; }
        
        .btn-marcar { 
            grid-column: 1 / -1; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; 
            font-weight: 800; cursor: pointer; text-transform: uppercase; transition: background 0.3s, transform 0.1s;
        }
        .btn-marcar:hover { background: #2c3e50; }
        .btn-atualizar { background: #e67e22 !important; }
        
        /* ESTILO WEB (TABELA) */
        .table-wrapper { background: #ffffff; border-radius: 12px; border: 1px solid #e2e8f0; overflow-x: auto; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { background: #f8fafc; padding: 12px 10px; text-align: left; border-bottom: 2px solid #e2e8f0; color: #64748b; font-size: 12px; text-transform: uppercase; }
        td { padding: 12px 10px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }

        .historico-wrapper { background: #d1d5db !important; }
        .row-finalizado td { background-color: #cbd5e0 !important; color: #475569 !important; border-bottom-color: #94a3b8; }
        .row-conflito td { background-color: #ffe3e3 !important; color: #c92a2a !important; font-weight: 600; }
        .row-conflito { border-left: 8px solid var(--error) !important; }
        
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; white-space: nowrap; }
        .badge-casa { background: #d0ebff; color: #1971c2; }
        .badge-fora { background: #ffe3e3; color: #c92a2a; }
        .badge-finalizado { background: #94a3b8; color: white; }
        
        .btn-action { background: #ffffff; border: 1px solid #e2e8f0; padding: 4px 8px; border-radius: 6px; cursor: pointer; }
        .btn-finalizar { background: var(--accent); color: white; border: none; padding: 6px 10px; border-radius: 6px; font-size: 10px; font-weight: bold; cursor: pointer; }
        .resultado-tag { font-weight: 800; color: var(--primary); font-size: 14px; display: block; margin-top: 4px; }
        .win-icon { color: #f1c40f; margin-left: 5px; font-size: 16px; }
        .secao-titulo { margin: 30px 0 15px 0; color: var(--primary); display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 800; }
        .secao-titulo::before { content: ""; width: 5px; height: 20px; background: var(--accent); border-radius: 3px; }
        .error-tag { color: var(--error); font-size: 10px; font-weight: 800; margin-top: 4px; padding: 2px 5px; background: #ffffff; border-radius: 4px; border: 1px solid var(--error); }

        /* NOVO LAYOUT DE CARDS PARA MOBILE (Referência Lovable) */
        #listaMobile, #listaHistoricoMobile { display: none; flex-direction: column; gap: 15px; }

        @media screen and (max-width: 1024px) {
            .table-wrapper { display: none; } /* Esconde a tabela no Mobile/Tablet */
            #listaMobile, #listaHistoricoMobile { display: flex; } /* Mostra os cards */
            
            .game-card {
                background: white; border-radius: 15px; padding: 15px;
                box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e2e8f0;
                display: grid; grid-template-columns: 1fr 1fr; gap: 10px; position: relative;
            }
            .game-card.conflito-card { background: #fff5f5; border-color: #feb2b2; }
            .game-card .card-header { grid-column: 1 / -1; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 5px; }
            .game-card .game-title { font-weight: 800; font-size: 16px; color: var(--primary); display: flex; align-items: center; gap: 5px; }
            .game-card .info-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #4a5568; }
            .game-card .card-actions { grid-column: 1 / -1; display: flex; gap: 10px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
            .btn-edit-mobile { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e0; background: white; font-weight: 600; display: flex; justify-content: center; align-items: center; gap: 5px; }
            
            .form-grid, .filter-grid { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
            header { flex-direction: column; gap: 10px; text-align: center; }
        }
    </style>
</head>
<body>

<div id="loginScreen">
    <div class="login-box">
        <img src="academicos.png" alt="Logo" class="login-logo">
        <input type="text" id="userIn" placeholder="Usuário">
        <input type="password" id="passIn" placeholder="Senha">
        <button onclick="checkLogin()">Entrar</button>
    </div>
</div>

<div class="main-content" id="app">
    <div class="container">
        <header>
            <div style="display: flex; align-items: center;">
                <img src="academicos.png" alt="Logo" class="header-logo">
                <h2 style="margin:0; color: var(--primary);">FC Académicos - Gestão</h2>
            </div>
            <button onclick="location.reload()" style="cursor:pointer; padding: 8px; border-radius: 8px; background: white; font-weight: 600;">Sair</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card"><h3>Total</h3><p id="statTotal">0</p></div>
            <div class="stat-card" style="border-left-color: #3498db;"><h3>Casa</h3><p id="statCasa">0</p></div>
            <div class="stat-card" style="border-left-color: #e67e22;"><h3>Fora</h3><p id="statFora">0</p></div>
            <div class="stat-card" style="border-left-color: var(--success);"><h3>Fim</h3><p id="statFim">0</p></div>
        </div>

        <button class="collapsible-trigger" onclick="toggleSection('formAgendamento')">
            <span>➕ NOVO AGENDAMENTO DE JOGO</span>
            <span id="formAgendamentoIcon">▼</span>
        </button>
        <div id="formAgendamento" class="collapsible-content">
            <div class="form-grid">
                <div class="field"><label>Treinador</label>
                    <select id="treinador">
                        <option value="">Selecione...</option>
                        <option value="Jorge Torres">Jorge Torres</option>
                        <option value="Amanda González">Amanda González</option>
                        <option value="Pedro Carvalho">Pedro Carvalho</option>
                        <option value="Inês Ferreira">Inês Ferreira</option>
                        <option value="Hamilton Júnior">Hamilton Júnior</option>
                        <option value="Ricardo Pereira">Ricardo Pereira</option>
                        <option value="Ricardo Magno">Ricardo Magno</option>
                        <option value="Pedro Pavezzi">Pedro Pavezzi</option>
                        <option value="Carlos Louro">Carlos Louro</option>
                        <option value="Cristina Cortez">Cristina Cortez</option>
                        <option value="Bruno Pereira">Bruno Pereira</option>
                        <option value="Pablo Romero">Pablo Romero</option>
                        <option value="Hélder Serrão">Hélder Serrão</option>
                        <option value="Carlos Martins">Carlos Martins</option>
                    </select>
                </div>
                <div class="field"><label>Cor</label><input type="color" id="cor" value="#3498db"></div>
                <div class="field"><label>Localização</label>
                    <select id="casaFora" onchange="togglePavilionField()">
                        <option value="Casa">Casa 🏠</option><option value="Fora">Fora 🚌</option>
                    </select>
                </div>
                <div class="field"><label>Data</label><input type="date" id="data"></div>
                <div class="field"><label>Hora</label><input type="time" id="hora"></div>
                <div class="field"><label>Comp.</label><input type="text" id="competicao" placeholder="Competição"></div>
                <div class="field"><label>Jor.</label><input type="text" id="jornada" placeholder="Jornada"></div>
                <div class="field"><label>Nº Jogo</label><input type="number" id="numJogo" placeholder="Nº"></div>
                <div class="field"><label>Escalão</label>
                    <select id="escalao">
                        <option value="">Selecione...</option>
                        <option value="Infantis A Fem">Infantis A Fem</option>
                        <option value="Infantis B Fem">Infantis B Fem</option>
                        <option value="Infantis C Fem">Infantis C Fem</option>
                        <option value="Iniciados A Fem">Iniciados A Fem</option>
                        <option value="Iniciados B Fem">Iniciados B Fem</option>
                        <option value="Iniciados Masc">Iniciados Masc</option>
                        <option value="Cadetes Fem">Cadetes Fem</option>
                        <option value="Cadetes Masc">Cadetes Masc</option>
                        <option value="Juvenis A Fem">Juvenis A Fem</option>
                        <option value="Juvenis B Fem">Juvenis B Fem</option>
                        <option value="Juvenis Masc">Juvenis Masc</option>
                        <option value="Sub21 Fem">Sub21 Fem</option>
                        <option value="Séniores Fem">Séniores Fem</option>
                        <option value="Séniores Masc">Séniores Masc</option>
                        <option value="Veteranos +35 Masc">Veteranos +35 Masc</option>
                        <option value="Veteranos +45 Masc">Veteranos +45 Masc</option>
                    </select>
                </div>
                <div class="field"><label>Adversário</label><input type="text" id="adversario"></div>
                <div class="field" id="pavilhaoContainer"><label>Pavilhão</label>
                    <select id="pavilhao">
                        <option value="ES ALCAIDES FARIA">ES ALCAIDES FARIA</option>
                        <option value="MUNICIPAL DE ADÃES">MUNICIPAL DE ADÃES</option>
                    </select>
                </div>
                <div class="field" id="boxSetPro" style="display:none;"><label>Set Pró</label><input type="number" id="setPro" value="0"></div>
                <div class="field" id="boxSetContra" style="display:none;"><label>Set Contra</label><input type="number" id="setContra" value="0"></div>
                <div class="field" id="boxParciais" style="display:none; grid-column: 1 / -1;"><label>Parciais</label><input type="text" id="parciais"></div>
                <button class="btn-marcar" id="btnSalvar" onclick="salvarJogo()">Agendar Jogo</button>
            </div>
        </div>

        <div class="filter-grid">
            <div class="field"><label>🔍 Treinador</label><select id="filterTreinador" onchange="render()"><option value="">Todos</option></select></div>
            <div class="field"><label>🔍 Escalão</label><select id="filterEscalao" onchange="render()"><option value="">Todos</option></select></div>
            <div class="field"><label>🔍 Data</label><input type="date" id="filterData" onchange="render()"></div>
            <div class="field"><label>🔍 Mês</label>
                <select id="filterMes" onchange="render()">
                    <option value="">Todos</option><option value="01">Jan</option><option value="02">Fev</option><option value="03">Mar</option><option value="04">Abr</option><option value="05">Mai</option><option value="06">Jun</option><option value="07">Jul</option><option value="08">Ago</option><option value="09">Set</option><option value="10">Out</option><option value="11">Nov</option><option value="12">Dez</option>
                </select>
            </div>
            <div class="field"><label>🔍 Local</label><select id="filterLocal" onchange="handleFilterLocalChange()"><option value="">Todos</option><option value="Casa">Casa</option><option value="Fora">Fora</option></select></div>
            <div class="field" id="filterPavilhaoContainer" style="display:none;"><label>🔍 Pavilhão</label><select id="filterPavilhao" onchange="render()"><option value="">Todos</option><option value="ES ALCAIDES FARIA">ES ALCAIDES FARIA</option><option value="MUNICIPAL DE ADÃES">MUNICIPAL DE ADÃES</option></select></div>
            <div style="display: flex; align-items: flex-end;"><button onclick="window.print()" style="padding: 10px 15px; cursor:pointer; background: #55acee; color: white; border:none; border-radius: 8px; font-weight:bold;">🖨️ PDF</button></div>
        </div>

        <h3 class="secao-titulo">Próximos Jogos</h3>
        <div class="table-wrapper"><table><thead><tr><th></th><th>Treinador</th><th>Comp.</th><th>Jor.</th><th>Nº</th><th>Escalão</th><th>Adversário</th><th>Data/Hora</th><th>Pavilhão</th><th>Tipo</th><th>Ações</th></tr></thead><tbody id="lista"></tbody></table></div>
        <div id="listaMobile"></div>

        <button class="collapsible-trigger" onclick="toggleSection('historicoContainer')" style="background: var(--finished-text); margin-top: 20px;">
            <span>📜 HISTÓRICO DE JOGOS</span>
            <span id="historicoContainerIcon">▼</span>
        </button>
        <div id="historicoContainer" class="collapsible-content">
            <div class="table-wrapper historico-wrapper"><table><thead><tr><th></th><th>Treinador</th><th>Comp.</th><th>Jor.</th><th>Nº</th><th>Escalão</th><th>Adversário/Res.</th><th>Data/Hora</th><th>Pavilhão</th><th>Status</th><th>Ações</th></tr></thead><tbody id="listaHistorico"></tbody></table></div>
            <div id="listaHistoricoMobile"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyB86TeZnp2qdOXXwjvD3hFfzTi3Z3NkVMc", authDomain: "academicos-d2cfc.firebaseapp.com", projectId: "academicos-d2cfc", storageBucket: "academicos-d2cfc.firebasestorage.app", messagingSenderId: "550824625713", appId: "1:550824625713:web:f3194f8e4f06dc141a3710" };
    const app = initializeApp(firebaseConfig); const db = getFirestore(app); const jogosCol = collection(db, "jogos");
    let jogosAtuais = []; let editId = null;

    window.toggleSection = (id) => {
        const content = document.getElementById(id);
        const icon = document.getElementById(id + 'Icon');
        content.classList.toggle('active');
        icon.innerText = content.classList.contains('active') ? '▲' : '▼';
    };

    window.checkLogin = () => { if(document.getElementById('userIn').value === 'academicos' && document.getElementById('passIn').value === 'academicos2026') { document.getElementById('loginScreen').style.display = 'none'; document.getElementById('app').style.display = 'block'; carregarJogos(); popularFiltros(); } else { alert("Senha incorreta!"); } };
    function popularFiltros() { const tSel = document.getElementById('treinador').innerHTML; const eSel = document.getElementById('escalao').innerHTML; document.getElementById('filterTreinador').innerHTML = '<option value="">Todos os Treinadores</option>' + tSel; document.getElementById('filterEscalao').innerHTML = '<option value="">Todos os Escalões</option>' + eSel; }

    window.handleFilterLocalChange = () => {
        const local = document.getElementById('filterLocal').value;
        const pContainer = document.getElementById('filterPavilhaoContainer');
        if (local === 'Casa') { pContainer.style.display = 'flex'; } else { pContainer.style.display = 'none'; document.getElementById('filterPavilhao').value = ''; }
        render();
    };

    window.togglePavilionField = () => {
        const local = document.getElementById('casaFora').value;
        const container = document.getElementById('pavilhaoContainer');
        if (local === 'Casa') {
            container.innerHTML = `<label>Pavilhão</label><select id="pavilhao"><option value="ES ALCAIDES FARIA">ES ALCAIDES FARIA</option><option value="MUNICIPAL DE ADÃES">MUNICIPAL DE ADÃES</option></select>`;
        } else {
            container.innerHTML = `<label>Pavilhão</label><input type="text" id="pavilhao" placeholder="Nome pavilhão">`;
        }
    };

    window.salvarJogo = async () => {
        const btn = document.getElementById('btnSalvar'); btn.disabled = true;
        const dados = { treinador: document.getElementById('treinador').value, cor: document.getElementById('cor').value, casaFora: document.getElementById('casaFora').value, data: document.getElementById('data').value, hora: document.getElementById('hora').value, competicao: document.getElementById('competicao').value, jornada: document.getElementById('jornada').value, numJogo: document.getElementById('numJogo').value, escalao: document.getElementById('escalao').value, adversario: document.getElementById('adversario').value, pavilhao: document.getElementById('pavilhao').value, setPro: document.getElementById('setPro').value || 0, setContra: document.getElementById('setContra').value || 0, parciais: document.getElementById('parciais').value || '', finalizado: editId ? (jogosAtuais.find(x => x.id === editId).finalizado || false) : false };
        try { if(editId) { await updateDoc(doc(db, "jogos", editId), dados); editId = null; } else { await addDoc(jogosCol, dados); } limpar(); document.getElementById('formAgendamento').classList.remove('active'); document.getElementById('formAgendamentoIcon').innerText = '▼'; } catch (e) { alert("Erro ao salvar!"); }
        btn.disabled = false; btn.innerText = "Agendar Jogo"; btn.classList.remove("btn-atualizar"); window.togglePavilionField(); 
    };

    window.finalizarJogoPrompt = (id) => { if (prompt("Senha para finalizar:") === "academicos2026") { const sp = prompt("Sets Pró:", "0"); const sc = prompt("Sets Contra:", "0"); const pa = prompt("Parciais:", ""); updateDoc(doc(db, "jogos", id), { finalizado: true, setPro: sp, setContra: sc, parciais: pa }); } };
    function carregarJogos() { const q = query(jogosCol, orderBy("data"), orderBy("hora")); onSnapshot(q, (snapshot) => { jogosAtuais = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })); render(); }); }

    window.render = () => {
        const lista = document.getElementById('lista'); const listaHistorico = document.getElementById('listaHistorico');
        const listaMobile = document.getElementById('listaMobile'); const listaHistoricoMobile = document.getElementById('listaHistoricoMobile');
        
        const fTreinador = document.getElementById('filterTreinador').value; const fEscalao = document.getElementById('filterEscalao').value; const fLocal = document.getElementById('filterLocal').value; const fData = document.getElementById('filterData').value; const fMes = document.getElementById('filterMes').value; const fPavilhao = document.getElementById('filterPavilhao').value;
        
        lista.innerHTML = ''; listaHistorico.innerHTML = ''; listaMobile.innerHTML = ''; listaHistoricoMobile.innerHTML = '';
        const agora = new Date(); let cCasa = 0, cFora = 0, cFim = 0;
        
        jogosAtuais.forEach(j => j.conflito = false);
        for (let i = 0; i < jogosAtuais.length; i++) {
            for (let j = i + 1; j < jogosAtuais.length; j++) {
                let a = jogosAtuais[i], b = jogosAtuais[j];
                if(!a.finalizado && !b.finalizado && a.casaFora === 'Casa' && b.casaFora === 'Casa' && a.data === b.data && a.pavilhao === b.pavilhao) {
                    let diff = Math.abs(new Date(a.data+'T'+a.hora) - new Date(b.data+'T'+b.hora)) / 60000;
                    if(diff < 120) { a.conflito = true; b.conflito = true; }
                }
            }
        }
        
        ativos = jogosAtuais.filter(j => !j.finalizado);
        finalizados = jogosAtuais.filter(j => j.finalizado).reverse();
        
        ativos.forEach(j => {
            if(j.casaFora === 'Casa') cCasa++; else cFora++;
            if(fTreinador && j.treinador !== fTreinador) return; if(fEscalao && j.escalao !== fEscalao) return; if(fLocal && j.casaFora !== fLocal) return; if(fData && j.data !== fData) return; if(fMes && j.data && j.data.split('-')[1] !== fMes) return; if(fLocal === 'Casa' && fPavilhao && j.pavilhao !== fPavilhao) return;
            
            // WEB ROW
            const tr = document.createElement('tr'); if(j.conflito) tr.className = 'row-conflito'; 
            const isPassado = j.data && j.hora && (agora > new Date(`${j.data}T${j.hora}`));
            tr.innerHTML = `<td style="background:${j.cor}; width:8px;"></td><td style="font-weight:bold; color:${j.cor}">${j.treinador}</td><td>${j.competicao || '-'}</td><td>${j.jornada || '-'}</td><td>${j.numJogo || '-'}</td><td>${j.escalao}</td><td>${j.adversario}</td><td>${j.data ? j.data.split('-').reverse().join('/') : '-'} às ${j.hora || '--:--'}${j.conflito ? '<br><span class="error-tag">⚠️ Conflito</span>' : ''}${isPassado ? `<br><button class="btn-finalizar" onclick="finalizarJogoPrompt('${j.id}')">🏁 Finalizar</button>` : ''}</td><td>${j.pavilhao || '-'}</td><td><span class="badge ${j.casaFora === 'Casa' ? 'badge-casa' : 'badge-fora'}">${j.casaFora}</span></td><td><button class="btn-action" onclick="prepararEdicao('${j.id}')">✏️</button><button class="btn-action" onclick="eliminarJogo('${j.id}')">🗑️</button></td>`;
            lista.appendChild(tr);

            // MOBILE CARD
            const card = document.createElement('div'); card.className = `game-card ${j.conflito ? 'conflito-card' : ''}`;
            card.innerHTML = `<div class="card-header"><span class="game-title">${j.conflito ? '⚠️ ' : ''}${j.adversario || 'Sem Adversário'}</span><span class="badge badge-casa">Agendado</span></div><div class="info-item">📅 ${j.data ? j.data.split('-').reverse().join('/') : '-'} às ${j.hora || '--:--'}</div><div class="info-item">🏐 ${j.escalao}</div><div class="info-item" style="color:${j.cor}">👤 ${j.treinador}</div><div class="info-item">📍 ${j.casaFora} - ${j.pavilhao || '-'}</div><div class="card-actions"><button class="btn-edit-mobile" onclick="prepararEdicao('${j.id}')">✏️ Editar</button>${isPassado ? `<button class="btn-edit-mobile" style="background:var(--accent); color:white; border:none;" onclick="finalizarJogoPrompt('${j.id}')">🏁 Finalizar</button>` : ''}</div>`;
            listaMobile.appendChild(card);
        });
        
        finalizados.forEach(j => {
            cFim++; if(fTreinador && j.treinador !== fTreinador) return; if(fEscalao && j.escalao !== fEscalao) return; if(fLocal && j.casaFora !== fLocal) return; if(fData && j.data !== fData) return; if(fMes && j.data && j.data.split('-')[1] !== fMes) return; if(fLocal === 'Casa' && fPavilhao && j.pavilhao !== fPavilhao) return;
            const tr = document.createElement('tr'); tr.className = 'row-finalizado';
            const isWin = parseInt(j.setPro) > parseInt(j.setContra);
            tr.innerHTML = `<td style="background:${j.cor}; width:8px; opacity:0.6;"></td><td style="font-weight:bold; color:${j.cor}">${j.treinador}</td><td>${j.competicao || '-'}</td><td>${j.jornada || '-'}</td><td>${j.numJogo || '-'}</td><td>${j.escalao}</td><td>${j.adversario}<br><span class="resultado-tag">${j.setPro} - ${j.setContra}${isWin ? '<span class="win-icon">🏆</span>' : ''}</span><span class="parciais-tag">(${j.parciais || '---'})</span></td><td>${j.data ? j.data.split('-').reverse().join('/') : '-'}</td><td>${j.pavilhao || '-'}</td><td><span class="badge badge-finalizado">Fim</span></td><td><button class="btn-action" onclick="prepararEdicao('${j.id}')">✏️</button><button class="btn-action" onclick="eliminarJogo('${j.id}')">🗑️</button></td>`;
            listaHistorico.appendChild(tr);

            const card = document.createElement('div'); card.className = `game-card`; card.style.opacity = "0.7";
            card.innerHTML = `<div class="card-header"><span class="game-title">${j.adversario}</span><span class="badge badge-finalizado">Fim</span></div><div class="info-item">📅 ${j.data ? j.data.split('-').reverse().join('/') : '-'}</div><div class="info-item">🏆 Resultado: ${j.setPro} - ${j.setContra}</div><div class="info-item" style="color:${j.cor}">👤 ${j.treinador}</div><div class="card-actions"><button class="btn-edit-mobile" onclick="prepararEdicao('${j.id}')">✏️ Editar</button></div>`;
            listaHistoricoMobile.appendChild(card);
        });
        document.getElementById('statTotal').innerText = ativos.length + cFim; document.getElementById('statCasa').innerText = cCasa; document.getElementById('statFora').innerText = cFora; document.getElementById('statFim').innerText = cFim;
    };

    window.prepararEdicao = (id) => {
        const j = jogosAtuais.find(x => x.id === id); document.getElementById('treinador').value = j.treinador; document.getElementById('cor').value = j.cor; document.getElementById('casaFora').value = j.casaFora; window.togglePavilionField(); 
        document.getElementById('data').value = j.data; document.getElementById('hora').value = j.hora; document.getElementById('competicao').value = j.competicao || ''; document.getElementById('jornada').value = j.jornada || ''; document.getElementById('numJogo').value = j.numJogo || ''; document.getElementById('escalao').value = j.escalao; document.getElementById('adversario').value = j.adversario; document.getElementById('pavilhao').value = j.pavilhao;
        document.getElementById('boxSetPro').style.display = 'block'; document.getElementById('boxSetContra').style.display = 'block'; document.getElementById('boxParciais').style.display = 'block'; document.getElementById('setPro').value = j.setPro || 0; document.getElementById('setContra').value = j.setContra || 0; document.getElementById('parciais').value = j.parciais || '';
        const btn = document.getElementById('btnSalvar'); btn.innerText = "Atualizar Informações"; btn.classList.add("btn-atualizar"); document.getElementById('formAgendamento').classList.add('active'); document.getElementById('formAgendamentoIcon').innerText = '▲'; editId = id; window.scrollTo(0,0);
    };

    window.eliminarJogo = async (id) => { if (prompt("Senha para eliminar:") === "academicos2026") await deleteDoc(doc(db, "jogos", id)); };
    function limpar() { ['data','hora','competicao','jornada','numJogo','adversario','setPro', 'setContra', 'parciais'].forEach(id => document.getElementById(id).value = ''); const btn = document.getElementById('btnSalvar'); btn.innerText = "Agendar Jogo"; btn.classList.remove("btn-atualizar"); }
</script>
</body>
</html>
